name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger VPS Deploy via Webhook
        run: |
          curl -X POST "${{ secrets.VPS_DEPLOY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"ref":"main","head_commit":{"message":"${{ github.event.head_commit.message }}"}}' \
            --max-time 30 \
            -w "\nHTTP_STATUS:%{http_code}"
        shell: bash

      - name: Wait and verify
        run: |
          sleep 15
          for i in {1..12}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://andaralab.vercel.app)
            echo "Vercel status: $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Vercel: OK"
              break
            fi
            sleep 10
          done